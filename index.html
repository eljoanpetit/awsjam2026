<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS JAM 2026 - Barcelona State Competition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        body { font-family: 'Outfit', sans-serif; }
        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .bg-barcelona {
            background-image: linear-gradient(rgba(10, 15, 30, 0.92), rgba(10, 15, 30, 0.92)), url('https://images.unsplash.com/photo-1583422409516-2895a77efded?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .section-full {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 100px 20px;
            scroll-snap-align: center;
            scroll-snap-stop: always;
        }
        /* Institut TIC Colors */
        .text-itic-blue { color: #2f29a1; }
        .bg-itic-blue { background-color: #2f29a1; }
        .text-itic-green { color: #30efbc; }
        .bg-itic-green { background-color: #30efbc; }
        .border-itic-blue { border-color: #2f29a1; }
        .border-itic-green { border-color: #30efbc; }
        
        @keyframes pulse-green {
            0%, 100% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 10px rgba(48, 239, 188, 0.2)); }
            50% { transform: scale(1.02); opacity: 0.9; filter: drop-shadow(0 0 25px rgba(48, 239, 188, 0.4)); }
        }
        .animate-status {
            animation: pulse-green 3s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-[#0a0f1e] text-white bg-barcelona overflow-x-hidden">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const translations = {
            es: {
                challenge: "¿Te lo vas a perder?",
                what: "Qué",
                who: "Quién",
                how: "Cómo",
                when: "Cuándo",
                what_desc: "Hasta 100 equipos demostrando sus habilidades en AWS",
                who_desc: "Alumnado matriculado en centros incorporados al programa AWS ACADEMY con\u00A0una\u00A0",
                who_highlight: "suscripción a AWS SkillBuilder activa",
                how_desc: "La persona responsable (tutora/tutor) debe realizar el registro del equipo o equipos que participan.",
                how_btn: "Inscribirse ahora",
                days: "Días",
                hours: "Horas",
                minutes: "Minutos",
                seconds: "Segundos",
                date_label: "25 MARZO 2026 @ 17:00"
            },
            ca: {
                challenge: "T'ho vas a perdre?",
                what: "Què",
                who: "Qui",
                how: "Com",
                when: "Quan",
                what_desc: "Fins a 100 equips demostrant les seues habilitats en AWS",
                who_desc: "Alumnat matriculat en centres incorporats al programa AWS ACADEMY amb\u00A0una\u00A0",
                who_highlight: "subscripció a AWS SkillBuilder activa",
                how_desc: "La persona responsable (tutora/tutor) ha de fer el registre de l'equip o equips que participen.",
                how_btn: "Inscriure's ara",
                days: "Dies",
                hours: "Hores",
                minutes: "Minuts",
                seconds: "Segons",
                date_label: "25 MARÇ 2026 @ 17:00"
            },
            gl: {
                challenge: "Vascho perder?",
                what: "Que",
                who: "Quen",
                how: "Como",
                when: "Cando",
                what_desc: "Ata 100 equipos demostrando as súas habilidades en AWS",
                who_desc: "Alumnado matriculado en centros incorporados ao programa AWS ACADEMY cunha\u00A0",
                who_highlight: "subscrición a AWS SkillBuilder activa",
                how_desc: "A persoa responsable (titora/titor) debe realizar o rexistro do equipo o equipos que participan.",
                how_btn: "Inscribirse agora",
                days: "Días",
                hours: "Horas",
                minutes: "Minutos",
                seconds: "Segundos",
                date_label: "25 MARZO 2026 @ 17:00"
            },
            eu: {
                challenge: "Galduko duzu?",
                what: "Zer",
                who: "Nor",
                how: "Nola",
                when: "Noiz",
                what_desc: "100 talde arte AWSko trebetasunak erakusten",
                who_desc: "AWS ACADEMY programan sartuta dauden zentroetan matrikulatutako ikasleak,\u00A0",
                who_highlight: "AWS SkillBuilder harpidetza aktiboa dutenak",
                how_desc: "Arduradunak (tutoreak) eman behar du izena parte hartzen duen taldearen edo taldeen izenean.",
                how_btn: "Eman izena orain",
                days: "Egunak",
                hours: "Orduak",
                minutes: "Minutuak",
                seconds: "Segundoak",
                date_label: "2026ko MARTXOAREN 25ean @ 17:00"
            }
        };

        const Countdown = ({ targetDate, lang }) => {
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

            useEffect(() => {
                const calculate = () => {
                    const now = new Date().getTime();
                    const distance = targetDate - now;
                    if (distance < 0) return;
                    setTimeLeft({
                        days: Math.floor(distance / (1000 * 60 * 60 * 24)),
                        hours: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                        minutes: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                        seconds: Math.floor((distance % (1000 * 60)) / 1000)
                    });
                };
                calculate();
                const timer = setInterval(calculate, 1000);
                return () => clearInterval(timer);
            }, [targetDate]);

            const t = translations[lang];

            return (
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-3xl">
                    {[
                        { label: t.days, value: timeLeft.days },
                        { label: t.hours, value: timeLeft.hours },
                        { label: t.minutes, value: timeLeft.minutes },
                        { label: t.seconds, value: timeLeft.seconds }
                    ].map((unit, i) => (
                        <div key={i} className="glass p-5 md:p-8 rounded-3xl border border-white/10 shadow-2xl flex flex-col items-center">
                            <div className="text-4xl md:text-7xl font-black text-itic-green tabular-nums leading-none">
                                {unit.value.toString().padStart(2, '0')}
                            </div>
                            <div className="text-[10px] md:text-xs uppercase tracking-[0.3em] font-bold text-white/40 mt-3">
                                {unit.label}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const App = () => {
            const [lang, setLang] = useState('es');
            const targetDate = new Date('2026-03-25T17:00:00').getTime();
            const t = translations[lang];

            const scrollTo = (id) => {
                const el = document.getElementById(id);
                if (el) el.scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="selection:bg-itic-blue selection:text-white">
                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 glass border-b border-white/5">
                        <div className="max-w-7xl mx-auto px-4 md:px-6 py-3 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="flex items-center gap-2 bg-white rounded-lg p-1">
                                    <img src="https://agora.xtec.cat/iticbcn/wp-content/uploads/usu2389/2023/06/cropped-Imagotipo-1.png" alt="Institut TIC de Barcelona" className="h-7 md:h-10" />
                                    <div className="w-[1px] h-5 bg-slate-200"></div>
                                    <img src="https://www.awsacademy.com/webruntime/org-asset/1816f865fb/resource/0814N0000019OPK/images/logo.png" alt="AWS Academy" className="h-7 md:h-10" />
                                </div>
                                <span className="font-black text-sm md:text-lg tracking-tighter uppercase hidden sm:block">
                                    AWS JAM <span className="text-itic-green">2026</span>
                                </span>
                            </div>
                            
                            <div className="hidden lg:flex gap-8 font-bold uppercase text-[10px] tracking-[0.2em]">
                                <button onClick={() => scrollTo('que')} className="hover:text-itic-green transition-all">{t.what}</button>
                                <button onClick={() => scrollTo('qui')} className="hover:text-itic-green transition-all">{t.who}</button>
                                <button onClick={() => scrollTo('com')} className="hover:text-itic-green transition-all">{t.how}</button>
                                <button onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})} className="hover:text-itic-green transition-all">{t.when}</button>
                            </div>

                            <div className="flex bg-[#0a1a33]/80 p-1 rounded-xl border border-white/10">
                                {['es', 'ca', 'gl', 'eu'].map(l => (
                                    <button 
                                        key={l} 
                                        onClick={() => setLang(l)}
                                        className={`w-7 h-7 md:w-9 md:h-9 flex items-center justify-center rounded-lg text-[9px] md:text-[10px] font-black uppercase transition-all ${lang === l ? 'bg-itic-blue text-white shadow-lg' : 'text-white/40 hover:text-white'}`}
                                    >
                                        {l}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* HERO / CUANDO */}
                    <section id="hero" className="section-full relative overflow-hidden items-center text-center">
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-itic-blue/10 blur-[150px] rounded-full pointer-events-none"></div>
                        
                        <div className="text-center space-y-10 max-w-6xl z-10 w-full flex flex-col items-center">
                            <h1 className="text-4xl md:text-[10rem] font-black tracking-tighter uppercase leading-[0.85] drop-shadow-2xl px-4">
                                {t.challenge}
                            </h1>
                            
                            <div className="glass px-8 py-3 rounded-full border border-itic-green/30 text-itic-green font-black text-sm md:text-2xl tracking-widest animate-status">
                                {t.date_label}
                            </div>

                            <div className="px-4 w-full flex justify-center">
                                <Countdown targetDate={targetDate} lang={lang} />
                            </div>
                        </div>
                        
                        <button onClick={() => scrollTo('que')} className="absolute bottom-10 animate-bounce opacity-30 hover:opacity-100 transition-opacity">
                            <svg className="w-8 h-8 md:w-10 md:h-10 text-itic-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                        </button>
                    </section>

                    {/* QUÉ */}
                    <section id="que" className="section-full items-center bg-[#0a1a33]/40 text-center">
                        <div className="max-w-6xl w-full flex flex-col items-center space-y-8 md:space-y-12 px-4">
                            <div className="glass p-8 md:p-16 rounded-[40px] md:rounded-[60px] border-white/10 relative overflow-hidden w-full">
                                <h2 className="text-4xl md:text-8xl font-black mb-6 md:mb-10 uppercase text-itic-blue tracking-tighter">{t.what}</h2>
                                <p className="text-xl md:text-5xl leading-tight font-bold text-white/95">
                                    {t.what_desc}
                                </p>
                            </div>
                            <div className="flex justify-center w-full">
                                <div className="relative group">
                                    <div className="absolute inset-0 bg-itic-blue/10 blur-[80px] rounded-full group-hover:bg-itic-blue/20 transition-all duration-700"></div>
                                    <img src="https://jam.aws.com/assets/Homepage-hero.png" alt="AWS JAM Logo" className="w-full max-w-md md:max-w-2xl relative z-10 drop-shadow-[0_0_50px_rgba(47,41,161,0.2)]" />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* QUIÉN */}
                    <section id="qui" className="section-full items-center text-center">
                        <div className="max-w-6xl w-full px-4">
                            <div className="glass p-8 md:p-24 rounded-[40px] md:rounded-[60px] border-b-[8px] md:border-b-[16px] border-itic-green relative shadow-2xl overflow-hidden">
                                <div className="absolute -right-32 -bottom-32 w-96 h-96 bg-itic-green/5 rounded-full blur-[100px]"></div>
                                <h2 className="text-4xl md:text-8xl font-black mb-8 md:mb-12 uppercase text-itic-blue tracking-tighter">{t.who}</h2>
                                <div className="flex flex-col items-center space-y-6 md:space-y-8">
                                    <p className="text-lg md:text-5xl leading-[1.2] font-bold text-white/90">{t.who_desc}</p>
                                    <span className="bg-itic-green text-[#0a0f1e] px-5 py-2 md:px-8 md:py-4 rounded-2xl md:rounded-3xl inline-block shadow-xl shadow-itic-green/20 font-black text-sm md:text-4xl transform hover:scale-105 transition-transform uppercase">
                                        {t.who_highlight}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CÓMO */}
                    <section id="com" className="section-full items-center bg-[#0a1a33]/60 text-center">
                        <div className="max-w-5xl w-full text-center space-y-12 md:space-y-16 px-4">
                            <div className="glass p-10 md:p-32 rounded-[40px] md:rounded-[80px] border-white/5 shadow-2xl relative">
                                <h2 className="text-5xl md:text-9xl font-black uppercase text-itic-blue tracking-tighter mb-8 md:mb-12">{t.how}</h2>
                                <p className="text-lg md:text-4xl max-w-3xl mx-auto font-bold text-white/80 mb-10 md:mb-16 leading-relaxed">
                                    {t.how_desc}
                                </p>
                                <div className="flex justify-center w-full">
                                    <a 
                                        href="https://forms.gle/pouSbVobFFxwHsC86" 
                                        target="_blank" 
                                        className="inline-flex items-center gap-3 md:gap-6 bg-itic-blue hover:bg-itic-green hover:text-[#0a0f1e] text-white font-black text-lg md:text-4xl px-8 py-4 md:px-16 md:py-8 rounded-2xl md:rounded-[32px] transition-all transform hover:-translate-y-2 shadow-[0_20px_40px_rgba(47,41,161,0.3)] active:scale-95 group mx-auto"
                                    >
                                        {t.how_btn}
                                        <svg className="w-5 h-5 md:w-8 md:h-8 group-hover:translate-x-2 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="4" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-12 glass border-t border-white/5 text-center">
                        <div className="max-w-7xl mx-auto px-6 flex flex-col items-center gap-6">
                            <div className="flex items-center gap-3 bg-white rounded-lg p-2">
                                <img src="https://agora.xtec.cat/iticbcn/wp-content/uploads/usu2389/2023/06/cropped-Imagotipo-1.png" alt="Institut TIC de Barcelona" className="h-8 md:h-10" />
                                <div className="w-[1px] h-6 md:h-8 bg-slate-200"></div>
                                <img src="https://www.awsacademy.com/webruntime/org-asset/1816f865fb/resource/0814N0000019OPK/images/logo.png" alt="AWS Academy" className="h-8 md:h-10" />
                            </div>
                            <div className="text-white/30 text-[9px] md:text-[10px] uppercase tracking-[0.4em] font-bold">
                                © 2026 AWS JAM · INSTITUT TIC DE BARCELONA
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
